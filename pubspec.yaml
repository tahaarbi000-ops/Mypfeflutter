name: transport_tunisia
description: Application de transport en Tunisie
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # UI & QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  provider: ^6.1.1
  uuid: ^4.2.1
  intl: ^0.18.1
  image_picker: ^1.0.4
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_storage: ^11.6.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
